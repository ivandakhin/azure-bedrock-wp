name: Deploy to Azure VM

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
      image-changed: ${{ steps.changed.outputs.dockerfile }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if Dockerfile changed
        id: changed
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q 'Dockerfile'; then
            echo "dockerfile=true" >> $GITHUB_OUTPUT
          else
            echo "dockerfile=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate image tag
        id: meta
        run: echo "version=sha-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Login to GitHub Container Registry
        if: steps.changed.outputs.dockerfile == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: steps.changed.outputs.dockerfile == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy files via rsync
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.env' \
            --exclude='.env.local' \
            --exclude='web/app/uploads' \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/tx-pulse-cms/

      - name: Create .env on server
        env:
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_ROOT_PASSWORD: ${{ secrets.DB_ROOT_PASSWORD }}
          WP_HOME: ${{ secrets.WP_HOME }}
          AUTH_KEY: ${{ secrets.AUTH_KEY }}
          SECURE_AUTH_KEY: ${{ secrets.SECURE_AUTH_KEY }}
          LOGGED_IN_KEY: ${{ secrets.LOGGED_IN_KEY }}
          NONCE_KEY: ${{ secrets.NONCE_KEY }}
          AUTH_SALT: ${{ secrets.AUTH_SALT }}
          SECURE_AUTH_SALT: ${{ secrets.SECURE_AUTH_SALT }}
          LOGGED_IN_SALT: ${{ secrets.LOGGED_IN_SALT }}
          NONCE_SALT: ${{ secrets.NONCE_SALT }}
          IMAGE_TAG: ${{ needs.build.outputs.image-tag }}
        run: |
          printf 'DB_NAME=%s\n' "$DB_NAME" > /tmp/.env
          printf 'DB_USER=%s\n' "$DB_USER" >> /tmp/.env
          printf 'DB_PASSWORD=%s\n' "$DB_PASSWORD" >> /tmp/.env
          printf 'DB_ROOT_PASSWORD=%s\n' "$DB_ROOT_PASSWORD" >> /tmp/.env
          printf 'DB_HOST=mysql\n' >> /tmp/.env
          printf 'WP_ENV=production\n' >> /tmp/.env
          printf 'WP_HOME=%s\n' "$WP_HOME" >> /tmp/.env
          printf 'WP_SITEURL=%s/wp\n' "$WP_HOME" >> /tmp/.env
          printf 'AUTH_KEY=%s\n' "$AUTH_KEY" >> /tmp/.env
          printf 'SECURE_AUTH_KEY=%s\n' "$SECURE_AUTH_KEY" >> /tmp/.env
          printf 'LOGGED_IN_KEY=%s\n' "$LOGGED_IN_KEY" >> /tmp/.env
          printf 'NONCE_KEY=%s\n' "$NONCE_KEY" >> /tmp/.env
          printf 'AUTH_SALT=%s\n' "$AUTH_SALT" >> /tmp/.env
          printf 'SECURE_AUTH_SALT=%s\n' "$SECURE_AUTH_SALT" >> /tmp/.env
          printf 'LOGGED_IN_SALT=%s\n' "$LOGGED_IN_SALT" >> /tmp/.env
          printf 'NONCE_SALT=%s\n' "$NONCE_SALT" >> /tmp/.env
          printf 'GITHUB_REPOSITORY=%s\n' "${{ github.repository }}" >> /tmp/.env
          printf 'IMAGE_TAG=%s\n' "$IMAGE_TAG" >> /tmp/.env
          scp -i ~/.ssh/deploy_key /tmp/.env ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/tx-pulse-cms/.env
          rm /tmp/.env

      - name: Copy code into Docker volume and restart
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} bash <<'ENDSSH'
            set -e
            cd /var/www/tx-pulse-cms

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            if [ "${{ needs.build.outputs.image-changed }}" = "true" ]; then
              docker compose pull php
            fi

            docker run --rm \
              -v /var/www/tx-pulse-cms:/src \
              -v tx-pulse-cms_app_code:/dst \
              alpine sh -c "cp -a /src/. /dst/ && rm -rf /dst/web/app/uploads"

            docker compose up -d

            docker image prune -f
          ENDSSH
